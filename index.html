<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión | UAdeC</title>
    <meta name="description" content="Inicio de sesión UAdeC.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-logos">
          <img class="login-logo-uadec" src="assets/uadec-header.png" alt="Universidad Autónoma de Coahuila">
          <span></span>
          <img class="login-logo-vinculacion" src="assets/vinculacion-header.png" alt="Coordinación General de Vinculación e Innovación Productiva UAdeC">
        </div>

        <h1 id="login-title">Bienvenido, inicia sesión</h1>

        <form id="login-form" class="login-form" autocomplete="off">
          <label for="login-email">Correo</label>
          <input id="login-email" type="email" inputmode="email" autocomplete="new-password" autocapitalize="none" spellcheck="false" required>
          <button type="submit">Ingresar</button>
          <p class="login-error" id="login-error" hidden>Correo inválido. Ingresa un correo institucional UAdeC.</p>
        </form>

        <aside class="company-login-cta" aria-label="Registro para empresas">
          <p>¿Eres una empresa y deseas afiliarte?</p>
          <a href="registro.html">Registrar empresa</a>
        </aside>

        <div class="login-contact">
          <p><strong>Contáctanos</strong></p>
          <a href="mailto:vinculacion@uadec.edu.mx">vinculacion@uadec.edu.mx</a>
        </div>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
